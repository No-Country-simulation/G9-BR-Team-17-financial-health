services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nidus-test
      POSTGRES_USER: nidus
      POSTGRES_PASSWORD: nidus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nidus"]
      interval: 5s
      retries: 10
      start_period: 10s

  wiremock:
    image: wiremock/wiremock:latest
    command: ["--port", "8080"]
    volumes:
      - ./backend/src/test/resources/wiremock/mappings:/home/wiremock/mappings
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/"]
      interval: 5s
      retries: 10
      start_period: 5s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    command: pytest tests/ -v --cov --cov-report=term

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      - ML_SERVICE_URL=http://wiremock:8080
      - DB_URL=jdbc:postgresql://db:5432/nidus-test
      - DB_USER=nidus
      - DB_PASSWORD=nidus
      - SPRING_PROFILES_ACTIVE=test
    depends_on:
      wiremock:
        condition: service_started
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    command: npx vitest run --coverage
