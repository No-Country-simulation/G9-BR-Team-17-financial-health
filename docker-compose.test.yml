services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nidus
      POSTGRES_USER: nidus
      POSTGRES_PASSWORD: nidus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nidus"]
      interval: 5s
      retries: 10
      start_period: 10s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    command: pytest tests/ -v --cov

  wiremock:
    image: wiremock/wiremock:latest
    command: ["--port", "8080"]
    volumes:
      - ./backend/src/test/resources/wiremock:/home/wiremock

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ML_SERVICE_URL=http://wiremock:8080
      - DB_URL=jdbc:postgresql://db:5432/nidus
      - DB_USER=nidus
      - DB_PASSWORD=nidus
    command: mvn test
    depends_on:
      wiremock:
        condition: service_started
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    command: npx vitest run --coverage
