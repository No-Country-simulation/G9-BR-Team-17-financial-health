spring.application.name=nidus-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/nidus}
spring.datasource.username=${DB_USER:nidus}
spring.datasource.password=${DB_PASSWORD:nidus}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

ml-service.url=${ML_SERVICE_URL:http://ml-service:8000}
ml-service.timeout=5000
